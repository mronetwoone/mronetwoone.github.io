<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Markdown 内容阅读页面">
  <meta name="theme-color" content="#f7f7f2">
  <title>内容加载中…</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/markdown.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js" defer></script>
  <script src="assets/js/page.js" defer></script>
</head>
<body class="article-page">
  <div class="reading-progress" aria-hidden="true">
    <span id="reading-progress-bar"></span>
  </div>

  <a class="skip-link" href="#article-content">跳到正文</a>

  <header class="article-header">
    <div class="container article-nav">
      <a class="back-link" href="index.html">
        <span aria-hidden="true">←</span> 返回首页
      </a>
      <span class="article-label">Markdown Reader</span>
    </div>
  </header>

  <main class="article-shell container">
    <article class="markdown-body" id="article-content" aria-live="polite">
      <div class="article-status">
        <span class="status-spinner" aria-hidden="true"></span>
        <p>正在加载内容…</p>
      </div>
    </article>
  </main>

  <footer class="article-footer container">
    <a class="back-link" href="index.html">
      <span aria-hidden="true">←</span> 返回首页
    </a>
  </footer>
</body>
</html>
