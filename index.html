<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mronetwoone 的个人主页</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
        .formula {
            margin-top: 20px;
            font-style: italic;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 mronetwoone</h1>
        <p>这是我用 GitHub Pages 搭建的第一个个人主页。目前正在探索前端开发的奥秘！</p>
        <div class="formula">
            生命不仅仅是代码，还有诗和远方。
        </div>
        <a href="https://github.com/mronetwoone" class="btn">关注我的 GitHub</a>
    </div>
</body>
</html>
